spring:
  application:
    name: garage-backend
  datasource:
    url: jdbc:h2:mem:garagedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

server:
  port: 8080

garage:
  grpc:
    host: localhost
    port: 50051
  pricing:
    hourly-rate: 10.0
    daily-max: 80.0
    free-minutes: 30
  total-carriers: 8
  lock:
    rotation-key: garage:lock:rotation
    queue-key: garage:queue:rotation
    wait-timeout-seconds: 120
    lock-timeout-seconds: 300
